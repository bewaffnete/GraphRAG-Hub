name: graphrag-mcp

services:
  mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: graphrag-mcp:local
    container_name: graphrag-app
    restart: unless-stopped
    stdin_open: true
    tty: false
    working_dir: /app
    environment:
      GRAPHRAG_APP_NAME: "${GRAPHRAG_APP_NAME:-graphrag-mcp}"
      GRAPHRAG_APP_VERSION: "${GRAPHRAG_APP_VERSION:-0.1.0}"
      GRAPHRAG_NEO4J_BACKEND: "neo4j"
      GRAPHRAG_NEO4J_URI: "bolt://neo4j:7687"
      GRAPHRAG_NEO4J_USERNAME: "${GRAPHRAG_NEO4J_USERNAME:-neo4j}"
      GRAPHRAG_NEO4J_PASSWORD: "${GRAPHRAG_NEO4J_PASSWORD:-change-me}"
      GRAPHRAG_NEO4J_DATABASE: "${GRAPHRAG_NEO4J_DATABASE:-neo4j}"
      GRAPHRAG_NEO4J_VECTOR_INDEX_NAME: "${GRAPHRAG_NEO4J_VECTOR_INDEX_NAME:-graph_node_embedding_index}"
      GRAPHRAG_NEO4J_FULLTEXT_INDEX_NAME: "${GRAPHRAG_NEO4J_FULLTEXT_INDEX_NAME:-graph_node_fulltext_index}"
      GRAPHRAG_EMBEDDING_PROVIDER: "${GRAPHRAG_EMBEDDING_PROVIDER:-ollama}"
      GRAPHRAG_EMBEDDING_MODEL: "${GRAPHRAG_EMBEDDING_MODEL:-qwen3-embedding:0.6b}"
      GRAPHRAG_EMBEDDINGS_ENABLED: "${GRAPHRAG_EMBEDDINGS_ENABLED:-true}"
      GRAPHRAG_EMBEDDING_BASE_URL: "${GRAPHRAG_EMBEDDING_BASE_URL:-http://ollama:11434/api}"
      GRAPHRAG_EMBEDDING_TIMEOUT_SECONDS: "${GRAPHRAG_EMBEDDING_TIMEOUT_SECONDS:-30}"
      GRAPHRAG_EMBEDDING_SCHEMA_VERSION: "${GRAPHRAG_EMBEDDING_SCHEMA_VERSION:-v1}"
      GRAPHRAG_REGISTRY_BACKEND: "${GRAPHRAG_REGISTRY_BACKEND:-in_memory}"
      GRAPHRAG_VENV_LIBS_CONTAINER_PATH: "${GRAPHRAG_VENV_LIBS_CONTAINER_PATH:-/user_venv}"
      GRAPHRAG_LOG_LEVEL: "${GRAPHRAG_LOG_LEVEL:-INFO}"
      GRAPHRAG_LOG_FORMAT: "${GRAPHRAG_LOG_FORMAT:-human}"
    volumes:
      - .:/workspace:ro
      - ${VENV_LIBS_PATH:-./.docker/user_venv_empty}:/user_venv:ro
    depends_on:
      neo4j:
        condition: service_healthy

  neo4j:
    image: neo4j:5-community
    container_name: graphrag-neo4j
    restart: unless-stopped
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: "${GRAPHRAG_NEO4J_USERNAME:-neo4j}/${GRAPHRAG_NEO4J_PASSWORD:-change-me}"
      NEO4J_server_memory_heap_initial__size: "${NEO4J_HEAP_INITIAL_SIZE:-512m}"
      NEO4J_server_memory_heap_max__size: "${NEO4J_HEAP_MAX_SIZE:-1G}"
      NEO4J_server_memory_pagecache_size: "${NEO4J_PAGECACHE_SIZE:-512m}"
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - neo4j-import:/var/lib/neo4j/import
      - neo4j-plugins:/plugins
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  ollama:
    image: ollama/ollama:latest
    container_name: graphrag-ollama
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  neo4j-data:
  neo4j-logs:
  neo4j-import:
  neo4j-plugins:
  ollama-data:
